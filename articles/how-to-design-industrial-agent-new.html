    <style type="text/tailwindcss">
        @layer base {

                --text-secondary: #666666;
                --border: #e5e5e5;

                background-color: var(--bg-primary);
                color: var(--text-primary);
                line-height: 1.8;
            }

                font-size: 1.1rem;
                font-weight: 600;
                margin-top: 1.5em;
                margin-bottom: 0.5em;
                color: var(--text-primary);
            }
            .article-content p {
                font-size: 1.125rem;
                color: var(--text-secondary);
            }
            .article-content ul, .article-content ol {
                margin-bottom: 1.5em;
                padding-left: 1.5em;
            }
            .article-content li {
                margin-bottom: 0.5em;
                font-size: 1.125rem;
                color: var(--text-secondary);
            }
            .article-content a {
                color: var(--accent);
                text-decoration: underline;
                text-decoration-color: rgba(212, 165, 116, 0.4);
                text-underline-offset: 3px;
            }
            .article-content blockquote {
                border-left: 3px solid var(--accent);
                padding-left: 1.5em;
                margin: 2em 0;
                font-style: italic;
                color: var(--text-secondary);
            }
            .article-content strong {
                color: var(--text-primary);
                font-weight: 600;
            }
            .code-block {
                background: var(--code-bg);
                border-radius: 12px;
                overflow: hidden;
                margin: 2em 0;
            }
            .code-header {
                background: rgba(22, 22, 30, 0.8);
                border-bottom: 1px solid rgba(255,255,255,0.1);
                padding: 12px 16px;
                display: flex;
                align-items: center;
                gap: 8px;
            }
            .code-dot {
                width: 12px;
                height: 12px;
                border-radius: 50%;
            }
            .code-body {
                padding: 20px;
                color: #cdd6f4;
                font-family: 'JetBrains Mono', monospace;
                font-size: 0.9rem;
                line-height: 1.6;
            }
            .flow-diagram {
                background: white;
                border: 1px solid var(--border);
                border-radius: 12px;
                padding: 1.5em;
                margin: 1.5em 0;

            .flow-step-v {
                display: flex;
                align-items: center;
                gap: 1em;
                padding: 1em;
                background: #f8f9fa;
                border-radius: 8px;
                margin-bottom: 0.5em;
                border-left: 3px solid var(--accent);
            }
            .flow-step-v.input { 
                border-left-color: #8B9DC3; 
                background: linear-gradient(135deg, #F5F7FA 0%, #E8ECF1 100%); 
            }
            .flow-step-v.process { 
                border-left-color: #D4A574; 
                background: linear-gradient(135deg, #FDF8F3 0%, #F5EDE3 100%); 
            }
            .flow-step-v.output { 
                border-left-color: #9CAF88; 
                background: linear-gradient(135deg, #F6F8F4 0%, #E8EDE3 100%); 
            }

                width: 2rem;
                height: 2rem;
                border-radius: 8px;

                font-weight: 600;
                flex-shrink: 0;
                border: 1px solid rgba(0,0,0,0.08);

            .flow-step-v.input .flow-step-icon { 
                background: #8B9DC3; 
                color: white; 
            }
            .flow-step-v.process .flow-step-icon { 
                background: #D4A574; 
                color: white; 
            }
            .flow-step-v.output .flow-step-icon { 
                background: #9CAF88; 
                color: white; 
            }

                display: flex;
                justify-content: center;
                padding: 0.5em 0;
                color: #999;
            }

                display: flex;
                gap: 0.5em;
                margin: 0.5em 0;
            }

                flex: 1;
                background: linear-gradient(135deg, #FAFBFC 0%, #F0F2F5 100%);
                border: 1px solid #E1E4E8;
                border-radius: 8px;
                padding: 0.75em;
                text-align: center;
                font-size: 0.85rem;
                transition: all 0.2s ease;
            }
            .flow-branch-item:hover {
                border-color: #D4A574;
                background: linear-gradient(135deg, #FDF8F3 0%, #F5EDE3 100%);
            }
            .flow-parallel {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 0.5em;
                margin: 0.5em 0;
            }
            .flow-parallel-item {
                background: linear-gradient(135deg, #FAFBFC 0%, #F0F2F5 100%);
                border: 1px solid #E1E4E8;
                border-radius: 8px;
                padding: 0.75em 0.5em;
                text-align: center;
                font-size: 0.8rem;
                transition: all 0.2s ease;

                border-color: #8B9DC3;
                background: linear-gradient(135deg, #F5F7FA 0%, #E8ECF1 100%);
            }

                font-size: 0.7rem;
                color: #999;

                margin: 2em 0;
                border-radius: 0 8px 8px 0;
            }
            .highlight-box {
                background: white;
                border: 1px solid var(--border);
                border-radius: 8px;
                padding: 1.25em;
                margin: 1.5em 0;

            .comparison-table {
                width: 100%;
                border-collapse: collapse;
                margin: 1.5em 0;
                font-size: 0.95rem;

                padding: 0.75em;
                text-align: left;
                font-weight: 600;
                border-bottom: 2px solid var(--border);
                white-space: nowrap;
            }
            .comparison-table td {
                padding: 0.75em;
                border-bottom: 1px solid var(--border);
                color: var(--text-secondary);
                vertical-align: top;
            }
            .comparison-table td:first-child {
                white-space: nowrap;
                font-weight: 600;
                color: var(--text-primary);
            }
            .timeline {
                position: relative;
                padding-left: 2.5em;
            }
            .timeline::before {
                content: '';
                position: absolute;
                left: 0.6em;
                top: 0.5em;
                bottom: 0.5em;
                width: 2px;
                background: #e5e5e5;
            }
            .timeline-item {
                position: relative;
                margin-bottom: 2em;
            }
            .timeline-item:last-child {
                margin-bottom: 0;
            }
            .timeline-number {
                position: absolute;
                left: -2.25em;
                top: 0;
                width: 1.25rem;
                height: 1.25rem;
                background: var(--accent);
                color: white;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 0.7rem;
                font-weight: 600;
            }
            .timeline-item:last-child .timeline-number {

            }
            .timeline-title {
                font-weight: 600;
                font-size: 1.1rem;
                margin-bottom: 0.5em;
                color: var(--text-primary);
            }

                color: var(--text-secondary);

            }

                padding: 0.2em 0.6em;
                background: rgba(212, 165, 116, 0.15);

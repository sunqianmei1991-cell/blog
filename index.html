<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qianmei's Agent Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Source+Serif+Pro:wght@400;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style type="text/tailwindcss">
        @layer base {
            :root {
                --bg-primary: #FAF9F6;
                --text-primary: #1a1a1a;
                --accent: #D4A574;
                --text-secondary: #666666;
                --border: #e5e5e5;
            }
            body {
                font-family: 'Source Serif Pro', serif;
                background-color: var(--bg-primary);
                color: var(--text-primary);
            }
            h1, h2, h3, .font-display {
                font-family: 'Playfair Display', serif;
            }
        }
        @layer components {
            .grain-overlay {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                pointer-events: none;
                opacity: 0.03;
                background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            }
            .article-item {
                border-bottom: 1px solid var(--border);
                transition: all 0.3s ease;
            }
            .article-item:hover {
                background: linear-gradient(90deg, rgba(212, 165, 116, 0.03) 0%, transparent 100%);
            }
            .article-item:hover .article-title {
                color: var(--accent);
            }
            .article-number {
                font-family: 'Playfair Display', serif;
                color: #e5e5e5;
                transition: color 0.3s ease;
            }
            .article-item:hover .article-number {
                color: var(--accent);
            }
            .tag {
                font-size: 0.7rem;
                letter-spacing: 0.05em;
                color: #999;
            }
        }
    </style>
</head>
<body class="min-h-screen">
    <div class="grain-overlay"></div>
    
    <!-- Header -->
    <header class="py-8 px-6 md:px-12">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-[#1a1a1a] flex items-center justify-center">
                    <span class="text-[#FAF9F6] font-display text-lg font-bold">Q</span>
                </div>
                <span class="font-display text-xl font-semibold tracking-tight">Qianmei's Agent Lab</span>
            </a>
            <nav class="hidden md:flex gap-6 text-sm text-[#666666]">
                <a href="#" class="hover:text-[#1a1a1a] transition-colors">文章</a>
                <a href="#" class="hover:text-[#1a1a1a] transition-colors">关于</a>
                <a href="#" class="hover:text-[#1a1a1a] transition-colors">RSS</a>
            </nav>
        </div>
    </header>

    <!-- Intro -->
    <section class="py-12 md:py-16 px-6 md:px-12">
        <div class="max-w-4xl mx-auto">
            <p class="text-[#D4A574] text-sm tracking-[0.25em] uppercase mb-4">技术博客</p>
            <h1 class="font-display text-4xl md:text-5xl lg:text-6xl font-semibold leading-[1.05] mb-6">
                探索 Agent 产品的<br/>设计与思考
            </h1>
            <p class="text-lg md:text-xl text-[#666666] leading-relaxed max-w-2xl">
                面向 Agent 产品经理的知识库，分享产品洞察、技术解读与开源项目分析。
            </p>
        </div>
    </section>

    <!-- Article List -->
    <section class="py-8 px-6 md:px-12">
        <div class="max-w-4xl mx-auto">
            <!-- Article 1 (Latest) -->
            <a href="articles/from-llm-to-agent.html" class="article-item block py-8 group">
                <div class="flex gap-6 md:gap-8">
                    <div class="flex-shrink-0 w-12 md:w-16 text-right">
                        <span class="article-number text-3xl md:text-4xl font-light">01</span>
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center gap-3 mb-3">
                            <span class="tag">产品知识</span>
                            <span class="text-xs text-[#999999]">2026.02.02</span>
                            <span class="text-xs text-[#999999]">·</span>
                            <span class="text-xs text-[#999999]">15 min read</span>
                        </div>
                        <h2 class="article-title font-display text-xl md:text-2xl font-semibold mb-3 transition-colors">
                            从 LLM 到 Agent：建立 AI Agent 认知框架
                        </h2>
                        <p class="text-[#666666] text-sm md:text-base leading-relaxed mb-3">
                            给 AI 初学者的系统性指南：用一个客服助手的故事，看懂从 LLM 到 Agent 的完整进化...
                        </p>
                        <div class="flex flex-wrap gap-2">
                            <span class="text-xs text-[#D4A574]">#LLM</span>
                            <span class="text-xs text-[#D4A574]">#AIAgent</span>
                            <span class="text-xs text-[#D4A574]">#产品入门</span>
                        </div>
                    </div>
                </div>
            </a>


        </div>
    </section>

    <!-- Footer -->
    <footer class="py-12 px-6 md:px-12">
        <div class="max-w-4xl mx-auto text-center">
            <p class="text-sm text-[#999999]">© 2024 Qianmei's Agent Lab</p>
        </div>
    </footer>
</body>
</html>
